name: treino_nutri_app
description: "App para gerenciamento de treino e dieta."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2+1
  path: ^1.9.1
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  image_picker: ^1.2.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  intl: ^0.20.2
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_app.png
    - assets/images/adicionar-foto.png

# Configuração da Tela de Carregamento Inicial (Splash) - Apenas o Logo Centralizado
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo_app.png

  android_12:
    image: assets/images/logo_app.png
    icon_background_color: "#FFFFFF"